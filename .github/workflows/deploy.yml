name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish
        run: dotnet publish EventEase.csproj -c Release -o release --nologo

      # GitHub Pages serves project sites under /<repo-name>/, so the WASM
      # app's <base href> must point at that subpath instead of "/".
      - name: Rewrite base href for project subpath
        run: sed -i 's|<base href="/" />|<base href="/${{ github.event.repository.name }}/" />|g' release/wwwroot/index.html

      # SPA fallback: GitHub Pages returns 404.html for unknown paths, so serve
      # the app shell there too to support deep links / client-side routes.
      - name: Add SPA 404 fallback
        run: cp release/wwwroot/index.html release/wwwroot/404.html

      # Prevent Jekyll from stripping files/folders that start with an underscore
      # (e.g. _framework), which Blazor WASM requires.
      - name: Add .nojekyll
        run: touch release/wwwroot/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: release/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
